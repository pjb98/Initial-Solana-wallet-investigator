openapi: 3.1.0
info:
  title: Solana Developer Wallet Investigator
  version: 1.0.0
servers:
  - url: https://initial-solana-wallet-investigator.onrender.com
paths:
  /analyze-developer-wallet:
    post:
      operationId: analyzeDeveloperWallet
      summary: Trace a suspected Solana developer wallet and related token flows
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
      responses:
        '200':
          description: Completed developer-wallet analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    type: object
                    additionalProperties: true
                  developer_attribution:
                    type: object
                    additionalProperties: true
                  summary:
                    type: object
                    additionalProperties: true
                  assessment:
                    type: object
                    additionalProperties: true
                additionalProperties: true
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    AnalyzeRequest:
      type: object
      required:
        - developer_wallet
      properties:
        developer_wallet:
          type: string
          description: Suspected developer wallet public key
        token_mint:
          type: string
          description: Optional token mint to scope the investigation
        max_side_wallet_depth:
          type: integer
          default: 2
          minimum: 1
          maximum: 3
